test_mode:
  enabled: true
  github_queries:
  - label:"good first issue" state:open language:TypeScript
  - label:"good first issue" state:open language:JavaScript
  - label:"good first issue" state:open language:Python
  - label:"help wanted" label:bug state:open
  skip_paid: true
  max_tasks_per_scan: 10
ollama:
  base_url: http://localhost:11434
  models:
    classifier: qwen2.5:0.5b
    simple_agent: qwen2.5-coder:7b-instruct-q4_K_M
    complex_agent: qwen2.5-coder:7b-instruct-q4_K_M
    code_reviewer: qwen2.5-coder:7b-instruct-q4_K_M
sandbox:
  enabled: true
  image: bounty-sandbox:latest
  memory: 2g
  cpus: '2'
  timeout: 600
opencode:
  api_key: YOUR..._KEY
  base_url: https://api.opencode.ai
  timeout: 300
agents:
  simple_task_max_loc: 50
  simple_task_max_files: 3
  max_retries: 3
  retry_delay: 60
database:
  path: data/bounty_factory.db
workspace:
  base_path: ../bounty_workspaces
git:
  username: YOUR_GITHUB_USERNAME
  token: YOUR...OKEN
  default_branch: main
logging:
  level: INFO
  file: logs/bounty_factory.log
  max_bytes: 10485760
  backup_count: 5
